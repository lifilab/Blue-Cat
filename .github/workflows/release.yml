name: release

on:
  push:
    tags: ['v*.*.*', 'v*.*.*-beta.*']

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    env:
      WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate
        run: php Blue-Cat/scripts/verify-baseline.php
      - name: Verify tag matches VERSION
        shell: pwsh
        run: |
          $version = (Get-Content Blue-Cat/VERSION -Raw).Trim()
          if ("v$version" -ne "${{ github.ref_name }}") { throw "El tag no coincide con VERSION" }
      - name: Package source artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path Blue-Cat,index.php,SECURITY.md -DestinationPath "dist/Blue-Cat-${{ github.ref_name }}.zip"
          Get-FileHash "dist/Blue-Cat-${{ github.ref_name }}.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  Blue-Cat-${{ github.ref_name }}.zip" } | Set-Content "dist/SHA256SUMS.txt"
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/Blue-Cat-${{ github.ref_name }}.spdx.json
      - name: Sign artifact when certificate is configured
        if: env.WINDOWS_SIGNING_CERT_BASE64 != ''
        shell: pwsh
        env:
          SIGN_CERT: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          SIGN_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          Write-Host "La firma Authenticode se habilitará al incorporar el instalador ejecutable en la fase de empaquetado."
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          generate_release_notes: true
          files: dist/*
