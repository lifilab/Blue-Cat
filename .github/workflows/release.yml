name: release

on:
  push:
    tags: ['v*.*.*', 'v*.*.*-beta.*']

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    env:
      WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
      WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate
        run: |
          php Blue-Cat/scripts/verify-baseline.php
          php Blue-Cat/scripts/verify-windows-package.php
      - name: Verify tag matches VERSION
        shell: pwsh
        run: |
          $version = (Get-Content Blue-Cat/VERSION -Raw).Trim()
          if ("v$version" -ne "${{ github.ref_name }}") { throw "El tag no coincide con VERSION" }
      - name: Package source artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path Blue-Cat,index.php,SECURITY.md -DestinationPath "dist/Blue-Cat-${{ github.ref_name }}.zip"
          Get-FileHash "dist/Blue-Cat-${{ github.ref_name }}.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  Blue-Cat-${{ github.ref_name }}.zip" } | Set-Content "dist/SHA256SUMS.txt"
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/Blue-Cat-${{ github.ref_name }}.spdx.json
      - name: Require signing certificate
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_BASE64)) {
            throw 'Release bloqueado: falta WINDOWS_SIGNING_CERT_BASE64.'
          }
      - name: Install pinned installer compiler
        shell: pwsh
        run: choco install innosetup --version=6.7.3 -y --no-progress
      - name: Fetch verified Windows runtimes
        shell: pwsh
        run: .\Blue-Cat\packaging\windows\scripts\Fetch-Runtimes.ps1
      - name: Import temporary signing certificate
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64)
          $cert = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $bytes,
            $env:WINDOWS_SIGNING_CERT_PASSWORD,
            [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::PersistKeySet
          )
          $store = [Security.Cryptography.X509Certificates.X509Store]::new('My','CurrentUser')
          $store.Open('ReadWrite'); $store.Add($cert); $store.Close()
          "BLUECAT_SIGNING_THUMBPRINT=$($cert.Thumbprint)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
      - name: Build and sign Windows server installer
        shell: pwsh
        run: |
          .\Blue-Cat\packaging\windows\scripts\Build-Installer.ps1 `
            -InnoCompiler 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' `
            -CertificateThumbprint $env:BLUECAT_SIGNING_THUMBPRINT `
            -RequireSignature
          Copy-Item Blue-Cat\packaging\windows\output\* dist\ -Force
          Get-ChildItem dist -File | Where-Object Name -ne 'SHA256SUMS.txt' | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Set-Content dist\SHA256SUMS.txt -Encoding ascii
      - name: Remove temporary signing certificate
        if: always() && env.BLUECAT_SIGNING_THUMBPRINT != ''
        shell: pwsh
        run: |
          Get-ChildItem Cert:\CurrentUser\My\$env:BLUECAT_SIGNING_THUMBPRINT -ErrorAction SilentlyContinue |
            Remove-Item -Force
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-beta.') }}
          generate_release_notes: true
          files: dist/*
