<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue-Cat · POS</title>
  <link rel="icon" href="../assets/img/Blue-Cat_logo-removebg.png" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/punto_de_venta.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="../public/Inicio.html" class="navbar-logo" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <img src="../assets/img/Blue-Cat_logo-removebg.png" style="height:32px;" alt="Blue-Cat">
        <span style="font-size:18px;font-weight:700;color:#fff;">Blue-Cat</span>
      </a>
      <div class="menu">
        <ul>
          <li><a href="../public/Inicio.html"><i class="fas fa-home"></i> Inicio</a></li>
          <li><a href="inventario.html"><i class="fas fa-box"></i> Inventario</a></li>
          <li><a href="cuadre_de_ventas.html"><i class="fas fa-chart-line"></i> Cuadre de Ventas</a></li>
          <li><a href="#" onclick="openCerrarSesionPopup()"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main container -->
  <div class="container">
    <!-- Left panel - Cart -->
    <div class="container-left">
      <div class="cart-header">
        <h2><i class="fas fa-shopping-cart"></i> Carrito</h2>
        <div class="cart-count" id="cart-count">0 productos</div>
      </div>

      <ul id="cart-items">
        <li class="empty-cart" id="empty-cart-msg">
          <i class="fas fa-cart-plus"></i>
          Agrega productos al carrito
        </li>
      </ul>

      <div class="cart-totals" id="cart-totals" style="display:none">
        <div class="total-row">
          <span class="label">Subtotal</span>
          <span class="value" id="subtotal-amount">$0</span>
        </div>
        <div class="total-row">
          <span class="label">Pago</span>
          <span class="value" id="payment-amount">$0</span>
        </div>
        <div class="total-row">
          <span class="label">Cambio</span>
          <span class="value" id="change-amount">$0</span>
        </div>
        <div class="total-row total">
          <span class="label">Total</span>
          <span class="value" id="total-amount">$0</span>
        </div>
      </div>

      <div class="payment-grid">
        <button class="payment-btn" id="efectivo-btn"><i class="fas fa-money-bill-wave"></i> Efectivo</button>
        <button class="payment-btn" id="tarjeta-btn"><i class="fas fa-credit-card"></i> Tarjeta</button>
        <button class="payment-btn" id="transferencia-btn"><i class="fas fa-university"></i> Transferencia</button>
        <button class="payment-btn cancel" id="cancelar-venta"><i class="fas fa-times"></i> Cancelar</button>
      </div>

      <button class="pagar-btn" id="pagar-btn"><i class="fas fa-check-circle"></i> PAGAR</button>
    </div>

    <!-- Right panel - Products -->
    <div class="container-right">
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="search-input" placeholder="Buscar por nombre o código de barras...">
      </div>
      <div class="product-grid" id="product-grid"></div>
    </div>
  </div>

  <!-- Popup: apertura de sesión -->
  <div id="popup" class="popup" style="display: none;">
    <div class="popup-content">
      <span class="close-btn" onclick="closePopup()">&times;</span>
      <h2><i class="fas fa-door-open"></i> Apertura de caja</h2>
      <form id="apertura-form" onsubmit="return apertura()">
        <label for="monto">Monto de apertura:</label>
        <input type="number" id="monto" name="monto" value="35500">
        <label for="empleado">Empleado:</label>
        <input type="text" id="empleado" name="empleado">
        <label for="nota">Nota:</label>
        <textarea id="nota" name="nota"></textarea>
        <button type="submit">Aceptar</button>
      </form>
    </div>
  </div>

  <!-- Popup: cerrar sesión -->
  <div id="cerrar-sesion-popup" class="popup" style="display: none;">
    <div class="popup-content">
      <span class="close-btn" onclick="CloseSesionPopUp()">&times;</span>
      <h2><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</h2>
      <p id="p-cerrar-sesion">¿Está seguro de que desea cerrar sesión?</p>
      <div class="popup-buttons">
        <button onclick="cerrarSesion()">Cerrar Sesión</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/punto_de_venta.js"></script>
  <script src="../assets/js/login_pvt.js"></script>
  <script src="../assets/js/navbar.js"></script>
</body>
</html>
