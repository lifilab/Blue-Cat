<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Diagnóstico · Blue-Cat Server</title>
  <link rel="stylesheet" href="../assets/css/blue-cat.css">
  <style>
    body{background:#f1f5f9;color:#0f172a;font-family:system-ui,sans-serif;margin:0}.diag{max-width:760px;margin:7vh auto;padding:24px}.diag-card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:28px;box-shadow:0 12px 35px rgba(15,23,42,.08)}.diag-head{display:flex;align-items:center;gap:14px;margin-bottom:24px}.diag-dot{width:16px;height:16px;border-radius:50%;background:#94a3b8}.diag-dot.ok{background:#10b981;box-shadow:0 0 0 6px #d1fae5}.diag-dot.warn{background:#f59e0b;box-shadow:0 0 0 6px #fef3c7}.diag-dot.err{background:#ef4444;box-shadow:0 0 0 6px #fee2e2}.diag-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.diag-item{background:#f8fafc;border-radius:12px;padding:16px}.diag-label{font-size:12px;color:#64748b;text-transform:uppercase;letter-spacing:.04em}.diag-value{font-size:17px;font-weight:700;margin-top:5px}.diag-actions{display:flex;gap:10px;margin-top:22px}.diag-actions a,.diag-actions button{border:0;border-radius:10px;padding:11px 16px;font-weight:650;cursor:pointer;text-decoration:none}.primary{background:#4f46e5;color:white}.secondary{background:#e2e8f0;color:#334155}@media(max-width:600px){.diag-grid{grid-template-columns:1fr}.diag{padding:14px}}
  </style>
</head>
<body>
  <main class="diag"><section class="diag-card">
    <div class="diag-head"><span id="diag-dot" class="diag-dot"></span><div><h1 style="margin:0;font-size:24px">Blue-Cat Server</h1><p id="diag-message" style="margin:4px 0 0;color:#64748b">Comprobando el servidor…</p></div></div>
    <div class="diag-grid">
      <div class="diag-item"><div class="diag-label">Servicio web</div><div id="diag-service" class="diag-value">—</div></div>
      <div class="diag-item"><div class="diag-label">Base de datos</div><div id="diag-database" class="diag-value">—</div></div>
      <div class="diag-item"><div class="diag-label">Configuración inicial</div><div id="diag-setup" class="diag-value">—</div></div>
      <div class="diag-item"><div class="diag-label">Versión</div><div id="diag-version" class="diag-value">—</div></div>
    </div>
    <div class="diag-actions"><button id="diag-refresh" class="primary" type="button">Volver a comprobar</button><a class="secondary" href="../index.html">Abrir Blue-Cat</a></div>
  </section></main>
  <script src="../assets/js/security.js"></script>
  <script src="../assets/js/diagnostico.js"></script>
</body>
</html>
